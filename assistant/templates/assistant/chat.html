<!DOCTYPE html>
<html>
<head>
    <title>AI Assistant</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            display: flex;
        }

        /* Sidebar */
        #sidebar {
            width: 25%;
            background: #202123;
            color: white;
            height: 100vh;
            padding: 10px;
        }

        #sidebar a {
            display: block;
            color: white;
            text-decoration: none;
            margin: 10px 0;
        }

        /* Chat area */
        #chat-area {
            width: 75%;
            padding: 20px;
            background: #f5f5f5;
        }

        #chat-box {
            height: 80vh;
            overflow-y: scroll;
            background: white;
            padding: 10px;
            border-radius: 10px;
        }

        .user {
            text-align: right;
            color: blue;
            margin: 10px;
        }

        .assistant {
            text-align: left;
            color: green;
            margin: 10px;
        }
    </style>
</head>

<body>

<!-- Sidebar -->
<div id="sidebar">
    <h3>💬 Chats</h3>

    <a href="/new/">➕ New Chat</a>

    {% for convo in conversations %}
        <a href="/?convo_id={{ convo.id }}">
            Chat {{ convo.id }}
        </a>
    {% endfor %}

    <hr>
    <a href="/accounts/logout/">Logout</a>
</div>

<!-- Chat Area -->
<div id="chat-area">

    <h2>🤖 AI Assistant</h2>

    <div id="chat-box">
        {% for msg in messages %}
            {% if msg.role == "user" %}
                <p class="user"><b>You:</b> {{ msg.content }}</p>
            {% else %}
                <p class="assistant"><b>AI:</b> {{ msg.content }}</p>
            {% endif %}
        {% endfor %}
    </div>

    <br>

    <input type="text" id="message" placeholder="Type message..." style="width:80%;">
    <button onclick="sendMessage()">Send</button>

</div>

<script>
const convoId = "{{ conversation.id }}";

function sendMessage() {
    let input = document.getElementById("message");
    let msg = input.value;

    if (!msg) return;

    let chatBox = document.getElementById("chat-box");

    chatBox.innerHTML += `<p class="user"><b>You:</b> ${msg}</p>`;
    input.value = "";

    fetch(`/chat/${convoId}/`, {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-CSRFToken": getCSRFToken()
        },
        body: "message=" + encodeURIComponent(msg)
    })
    .then(res => res.json())
    .then(data => {
        chatBox.innerHTML += `<p class="assistant"><b>AI:</b> ${data.response}</p>`;
        chatBox.scrollTop = chatBox.scrollHeight;
    });
}

function getCSRFToken() {
    return document.cookie.split('; ')
        .find(row => row.startsWith('csrftoken'))
        .split('=')[1];
}
</script>

</body>
</html>
